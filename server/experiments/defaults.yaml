# Default experiment configuration for interfere.
# Override per-experiment via INTERFERE_EXP_{NAME}_{PARAM} env vars.
# See server/experiments/config.py for loader details.

experiments:
  early_exit:
    enabled: false
    threshold: 0.95  # softmax confidence threshold for early exit

  reservoir_routing:
    enabled: false
    hidden_dim: 4096
    bottleneck: 64
    num_models: 4
    layer: 24           # which transformer layer to tap for hidden states
    activation: relu    # relu, gelu, or silu
    label_scheme: 4class  # 3class or 4class — must match num_models

  confidence_cascade:
    enabled: false
    accept_threshold: 0.8
    escalate_threshold: 0.6
    cloud_threshold: 0.6

  speculative_decoding:
    enabled: false
    draft_model: "local:qwen3.5-9b-4bit"
    num_draft_tokens: 5   # how many tokens to draft before verification

  # DEPRECATED: kv_quantization — replaced by turbo_quant. Remove in next release.
  # If you have local overrides for kv_quantization, migrate to turbo_quant.
  kv_quantization:
    enabled: false
    key_bits: 8
    value_bits: 4

  turbo_quant:
    enabled: false
    kv_bits: 4             # native quantization bits (2, 4, or 8) used under polar transform
    kv_group_size: 64      # group size for native quantization
    qjl_enabled: false     # QJL residual correction (requires jl_dim >= 2*head_dim)
    jl_dim: 256            # JL projection dimensions
